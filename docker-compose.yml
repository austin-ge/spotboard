services:
  app:
    build:
      context: .
      args:
        - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://spotboard:${POSTGRES_PASSWORD:-changeme}@db:5432/spotboard
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://spotboard.xyz}
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      - READSB_URL=http://readsb:80
      - AUTH_TRUST_HOST=true
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID:-}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=spotboard
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=spotboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotboard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  readsb:
    image: ghcr.io/sdr-enthusiasts/docker-adsb-ultrafeeder
    restart: unless-stopped
    environment:
      - READSB_NET_ONLY=true
      - READSB_NET_BEAST_INPUT_PORT=30004
      - READSB_JSON_INTERVAL=1
      - UPDATE_TAR1090=true
      - TAR1090_DEFAULTCENTERLAT=0
      - TAR1090_DEFAULTCENTERLON=0
    ports:
      # Beast TCP input — feeders connect here from outside
      - "30004:30004"
    tmpfs:
      - /run/readsb:size=64M
      - /tmp:size=64M
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
